<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form Monitoring MCCB</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f7f8;
      color: #333;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #0d3b66;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
    }

    input[type="text"],
    input[type="date"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      margin-top: 5px;
      border-radius: 5px;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
    }

    button {
      background-color: #0d3b66;
      color: white;
      border: none;
      padding: 12px;
      margin-top: 20px;
      width: 100%;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #145ea8;
    }

    #status {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Form Monitoring Arus MCCB</h2>
    <form id="meteringForm">
      <label>Nama Petugas:</label>
      <input type="text" name="petugas" required>

      <label>Tanggal:</label>
      <input type="date" name="tanggal" required>

      <label>MCCB:</label>
      <select name="mccb" required>
        <option value="">-- Pilih MCCB --</option>
        <option value="MCCB GPO / Administrasi">MCCB GPO / Administrasi</option>
        <option value="MCCB Peralatan G. Ops.">MCCB Peralatan G. Ops.</option>
        <option value="MSSC Pen. Lantai 2 G.Ops">MSSC Pen. Lantai 2 G.Ops</option>
        <option value="MCCB AC Studio Utama">MCCB AC Studio Utama</option>
        <option value="MCCB AC. R Berita/Siaran Lantai 2">MCCB AC. R Berita/Siaran Lantai 2</option>
        <option value="MCCB Berita/ Siaran Lantai 2">MCCB Berita/ Siaran Lantai 2</option>
        <option value="MCCB Studio 2">MCCB Studio 2</option>
      </select>

      <label>Arus R (A):</label>
      <input type="number" name="arus_r" required>

      <label>Arus S (A):</label>
      <input type="number" name="arus_s" required>

      <label>Arus T (A):</label>
      <input type="number" name="arus_t" required>

      <label>Catatan:</label>
      <textarea name="catatan" rows="3" placeholder="Tambahkan catatan jika ada..."></textarea>

      <button type="submit">📤 Kirim Data</button>
    </form>

    <p id="status"></p>
  </div>

  <script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwrGwnGqEkd3CvMggh23OuhpWKv3y80SFBApRK4BT608u9rXNyTxvabJ2Jxsy-ZVr2B7A/exec';
    const form = document.getElementById('meteringForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', e => {
      e.preventDefault();
      status.innerText = '⏳ Mengirim...';
      fetch(scriptURL, { method: 'POST', body: new FormData(form) })
        .then(response => {
          status.innerText = '✅ Data berhasil dikirim!';
          form.reset();
        })
        .catch(error => {
          console.error('Error!', error.message);
          status.innerText = '❌ Gagal mengirim. Coba lagi.';
        });
    });
  </script>
</body>
</html>
