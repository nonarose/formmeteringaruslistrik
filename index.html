<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Monitoring Arus TVRI Jateng</title>
  <link rel="icon" href="logo.png" type="image/png">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0d3b66; /* Warna biru khas TVRI / form utama */
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }
    .container {
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-width: 400px;
      width: 90%;
      position: relative;
      overflow: hidden;
    }
    /* Aksen garis di atas kartu */
    .container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 6px;
      background: #28a745;
    }
    .logo {
      width: 80px;
      margin-bottom: 15px;
    }
    h1 {
      color: #0d3b66;
      font-size: 22px;
      margin-bottom: 10px;
      line-height: 1.3;
    }
    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 35px;
      line-height: 1.6;
    }
    .btn-menu {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #28a745;
      color: #fff;
      text-decoration: none;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
      margin-bottom: 15px;
    }
    .btn-menu:hover {
      background: #218838;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
    }
    .btn-icon {
      font-size: 20px;
    }
    .footer {
      margin-top: 35px;
      font-size: 12px;
      color: #999;
      border-top: 1px dashed #eee;
      padding-top: 15px;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
    
    <h1>Portal Monitoring<br>Arus Transmisi</h1>
    <p>Hai teman-teman, berhubung ada masukan dan perubahan terkait Form Metering Arus, maka form yg lama dipindahkan linknya ya </p>
    <p>Pilih menu di bawah ini untuk mulai mengisi laporan shift harian Anda.</p>
    
    <a href="https://nonarose.github.io/reportarus2.0/" class="btn-menu">
      <span class="btn-icon">⚡</span> Pelaporan Arus Listrik
    </a>
    
    <div class="footer">
      &copy; 2026 TVRI Stasiun Jawa Tengah
    </div>
  </div>

</body>

</html>
