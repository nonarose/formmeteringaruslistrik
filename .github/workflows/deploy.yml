name: Deploy to Google Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout Repo
        uses: actions/checkout@v3

      - name: 🔧 Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install clasp (next version for service account support)
        run: npm install -g @google/clasp@next

      - name: 🔐 Write GCP Service Account Credentials
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > service_account.json

      - name: 🚀 Authenticate and Push to Apps Script
        run: |
          clasp login --creds service_account.json
          clasp push --force
